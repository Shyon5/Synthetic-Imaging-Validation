name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: All tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,viz]"

      - name: Install CPU-only PyTorch (Ubuntu and Windows)
        if: runner.os != 'macOS'
        run: |
          python -m pip install "torch>=2.2,<3.0" --index-url https://download.pytorch.org/whl/cpu
          python -m pip install "torchmetrics>=1.3,<2.0"

      - name: Install PyTorch (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install "torch>=2.2,<3.0" "torchmetrics>=1.3,<2.0"

      - name: Verify optional dependencies
        run: python -c "import matplotlib, torch, torchmetrics"

      - name: Run all tests with coverage
        run: python -m pytest --cov --cov-report=term-missing --cov-fail-under=90

  numpy1-compatibility:
    name: NumPy 1.26 compatibility (Ubuntu, Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/constraints/numpy1.txt

      - name: Install package and optional dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c ".github/constraints/numpy1.txt" -e ".[test,viz]"
          python -m pip install "torch>=2.2,<3.0" --index-url https://download.pytorch.org/whl/cpu
          python -m pip install "torchmetrics>=1.3,<2.0"

      - name: Run all tests with coverage
        run: python -m pytest --cov --cov-report=term-missing --cov-fail-under=90

  all-tests:
    name: Test suite
    if: always()
    needs: [core, numpy1-compatibility]
    runs-on: ubuntu-latest

    steps:
      - name: Check matrix results
        shell: bash
        run: |
          test "${{ needs.core.result }}" = "success"
          test "${{ needs.numpy1-compatibility.result }}" = "success"
