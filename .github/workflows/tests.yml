name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (${{ matrix.os }}, Python ${{ matrix.python-version }}, NumPy ${{ matrix.numpy-series }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full Python/NumPy compatibility coverage on Linux.
          - {os: ubuntu-latest, python-version: "3.10", numpy-series: "1.26", constraint-file: ".github/constraints/numpy1.txt"}
          - {os: ubuntu-latest, python-version: "3.10", numpy-series: "2.x", constraint-file: ".github/constraints/numpy2.txt"}
          - {os: ubuntu-latest, python-version: "3.11", numpy-series: "1.26", constraint-file: ".github/constraints/numpy1.txt"}
          - {os: ubuntu-latest, python-version: "3.11", numpy-series: "2.x", constraint-file: ".github/constraints/numpy2.txt"}
          - {os: ubuntu-latest, python-version: "3.12", numpy-series: "1.26", constraint-file: ".github/constraints/numpy1.txt"}
          - {os: ubuntu-latest, python-version: "3.12", numpy-series: "2.x", constraint-file: ".github/constraints/numpy2.txt"}
          - {os: ubuntu-latest, python-version: "3.13", numpy-series: "2.x", constraint-file: ".github/constraints/numpy2.txt"}
          - {os: ubuntu-latest, python-version: "3.14", numpy-series: "2.x", constraint-file: ".github/constraints/numpy2.txt"}

          # Representative cross-platform coverage for both NumPy series.
          - {os: windows-latest, python-version: "3.12", numpy-series: "1.26", constraint-file: ".github/constraints/numpy1.txt"}
          - {os: windows-latest, python-version: "3.12", numpy-series: "2.x", constraint-file: ".github/constraints/numpy2.txt"}
          - {os: macos-latest, python-version: "3.12", numpy-series: "1.26", constraint-file: ".github/constraints/numpy1.txt"}
          - {os: macos-latest, python-version: "3.12", numpy-series: "2.x", constraint-file: ".github/constraints/numpy2.txt"}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            ${{ matrix.constraint-file }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c "${{ matrix.constraint-file }}" -e ".[test]"

      - name: Run core tests
        run: python -m pytest -m "not torch"

  optional-torch:
    name: Optional PyTorch metrics (Ubuntu, Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install package and CPU-only PyTorch dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install "torch>=2.2,<3.0" --index-url https://download.pytorch.org/whl/cpu
          python -m pip install "torchmetrics>=1.3,<2.0"

      - name: Run optional PyTorch tests
        run: python -m pytest -m torch

  all-tests:
    name: Test suite
    if: always()
    needs: [core, optional-torch]
    runs-on: ubuntu-latest

    steps:
      - name: Check matrix results
        shell: bash
        run: |
          test "${{ needs.core.result }}" = "success"
          test "${{ needs.optional-torch.result }}" = "success"
